services:
  kitzchat:
    build:
      context: .
      dockerfile: Dockerfile
    image: kitzchat:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3001"
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3001}
      KITZCHAT_HOST_LOCK: ${KITZCHAT_HOST_LOCK:-localhost,127.0.0.1}
      DATABASE_URL: ${DATABASE_URL:-postgres://kitzchat:widauer@db:5432/kitzchat}
      KITZCHAT_STATE_DIR: /app/state
      KITZCHAT_WORKSPACE_ROOT: /app/state/runtime/default
      KITZCHAT_DEFAULT_INSTANCE: ${KITZCHAT_DEFAULT_INSTANCE:-default}
      KITZCHAT_ALLOW_POLICY_WRITE: ${KITZCHAT_ALLOW_POLICY_WRITE:-false}
      KITZCHAT_ALLOW_CRON_WRITE: ${KITZCHAT_ALLOW_CRON_WRITE:-false}
      KITZCHAT_ALLOW_WORKSPACE_WRITE: ${KITZCHAT_ALLOW_WORKSPACE_WRITE:-false}
      KITZCHAT_USE_DEFAULT_AGENT_META: ${KITZCHAT_USE_DEFAULT_AGENT_META:-false}
    ports:
      - ${APP_PORT:-3001}:3001
    labels:
      - traefik.enable=${TRAEFIK_ENABLE:-true}
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.kitzchat.rule=Host(`${TRAEFIK_HOST:-dashboard.aikitz.at}`)
      - traefik.http.routers.kitzchat.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
      - traefik.http.routers.kitzchat.tls=true
      - traefik.http.routers.kitzchat.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.services.kitzchat.loadbalancer.server.port=3001
    volumes:
      - kitzchat_state:/app/state
    networks:
      - internal
      - traefik
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kitzchat}
      POSTGRES_USER: ${POSTGRES_USER:-kitzchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-widauer}
    volumes:
      - kitzchat_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

volumes:
  kitzchat_db:
  kitzchat_state:

networks:
  internal:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}