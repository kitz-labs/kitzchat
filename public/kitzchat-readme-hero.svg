  <text x="160" y="670" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="24" font-weight="700">Praxisfokus</text>
  <text x="160" y="714" fill="#D7E5E3" font-family="Arial, sans-serif" font-size="22">KitzChat ist nicht nur Chat-UI, sondern ein Arbeitsmodus fuer Kundenbetreuung, KI-Betrieb, Reports und kontrollierte Automatisierung.</text>
