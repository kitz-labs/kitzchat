  <text x="1096" y="420" fill="#395466" font-family="Arial, sans-serif" font-size="20">Next.js 16 + React 19</text>
  <text x="1096" y="462" fill="#395466" font-family="Arial, sans-serif" font-size="20">SQLite / lokale State-Dateien</text>
  <text x="1096" y="504" fill="#395466" font-family="Arial, sans-serif" font-size="20">PostgreSQL Wallet + Ledger</text>
  <text x="1096" y="546" fill="#395466" font-family="Arial, sans-serif" font-size="20">Stripe Checkout + Entitlements</text>
  <text x="1096" y="588" fill="#395466" font-family="Arial, sans-serif" font-size="20">Optional OpenAI, GA4, Plausible</text>
  <rect x="1096" y="632" width="216" height="18" rx="9" fill="#17304A" fill-opacity="0.10"/>
  <rect x="1096" y="662" width="172" height="18" rx="9" fill="#C75B33" fill-opacity="0.14"/>
  <rect x="1096" y="692" width="240" height="18" rx="9" fill="#2C7A74" fill-opacity="0.14"/>
