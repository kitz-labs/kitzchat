  <text x="120" y="180" fill="#FFF8F1" font-family="Georgia, serif" font-size="88" font-weight="700">KitzChat</text>
  <text x="120" y="245" fill="#D7E5E3" font-family="Arial, sans-serif" font-size="30">AI workspace fuer Betrieb, Kundenchat, Agenten und Billing in einer App.</text>
  <rect x="120" y="310" width="400" height="210" rx="28" fill="#FFF8F1" fill-opacity="0.98"/>
  <text x="154" y="365" fill="#122033" font-family="Arial, sans-serif" font-size="22" font-weight="700">Operations Surface</text>
  <text x="154" y="410" fill="#395466" font-family="Arial, sans-serif" font-size="20">CRM, Analytics, Content,</text>
  <text x="154" y="440" fill="#395466" font-family="Arial, sans-serif" font-size="20">Cron, Compliance und Deploy-Status</text>
  <rect x="154" y="468" width="154" height="18" rx="9" fill="#C75B33" fill-opacity="0.18"/>
  <rect x="154" y="496" width="218" height="18" rx="9" fill="#2C7A74" fill-opacity="0.18"/>
