  <text x="590" y="368" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="26" font-weight="700">Customer + Agent Runtime</text>
  <rect x="590" y="402" width="164" height="42" rx="21" fill="#2C7A74"/>
  <text x="620" y="430" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="20">Chat</text>
  <rect x="768" y="402" width="164" height="42" rx="21" fill="#C75B33"/>
  <text x="790" y="430" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="20">Uploads</text>
  <rect x="590" y="462" width="164" height="42" rx="21" fill="#E1B65B"/>
  <text x="612" y="490" fill="#122033" font-family="Arial, sans-serif" font-size="20">Wallet</text>
  <rect x="768" y="462" width="164" height="42" rx="21" fill="#F5EFE6" fill-opacity="0.14" stroke="#8FB8B3"/>
  <text x="789" y="490" fill="#DCECE9" font-family="Arial, sans-serif" font-size="20">Agents</text>
  <text x="590" y="538" fill="#B7CDD1" font-family="Arial, sans-serif" font-size="19">Eine App, zwei Oberflaechen, ein gemeinsames Betriebsmodell.</text>
  <rect x="1060" y="310" width="392" height="448" rx="28" fill="#FFF8F1" fill-opacity="0.96"/>
