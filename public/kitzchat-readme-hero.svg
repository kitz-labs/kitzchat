<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F5EFE6"/>
  <rect x="48" y="48" width="1504" height="804" rx="36" fill="url(#bg)"/>
